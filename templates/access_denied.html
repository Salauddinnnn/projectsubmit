<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Access Denied</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="login-page denied-page">
    <div class="bg-orb orb-a"></div>
    <div class="bg-orb orb-b"></div>
    <div class="bg-orb orb-c"></div>

    <main class="access-shell">
        <section class="access-card">
            <p class="card-kicker">Restricted Route</p>
            <h1>Access Denied</h1>
            <p class="access-text">
                This Google account is not authorized for the Faculty dashboard.
            </p>
            {% if denied_email %}
            <p class="access-email">{{ denied_email }}</p>
            {% endif %}
            <div class="access-actions">
                <a href="/" class="auth-btn btn-student"><span>Go To Login Page</span></a>
                <a href="/login/student" class="auth-btn btn-teacher"><span>Continue as Student</span></a>
            </div>
        </section>
    </main>
</body>
</html>
